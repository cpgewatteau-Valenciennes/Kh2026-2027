<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Espace de révisions</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,600;1,6..72,500&family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --board:#20362c;
    --board-dark:#182a22;
    --chalk:#f2ede1;
    --chalk-dim:#c9d6cb;
    --pastel-yellow:#e7c873;
    --pastel-pink:#d98a8a;
    --pastel-blue:#8fb8c9;
    --line: rgba(242,237,225,0.14);
    --folder-tan:#cdb98a;
    --folder-tan-dark:#b39f6f;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at top left, rgba(255,255,255,0.03), transparent 60%),
      var(--board);
    color:var(--chalk);
    font-family:'Inter', sans-serif;
    min-height:100vh;
    padding:56px 20px 80px;
  }

  .wrap{max-width:760px;margin:0 auto;}

  header{margin-bottom:48px;}
  .eyebrow{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:var(--pastel-yellow);
    margin:0 0 14px;
  }
  h1{
    font-family:'Newsreader', serif;
    font-weight:600;
    font-size:clamp(32px, 5vw, 44px);
    line-height:1.1;
    margin:0 0 14px;
    color:var(--chalk);
  }
  header p{
    font-size:15px;
    color:var(--chalk-dim);
    max-width:52ch;
    line-height:1.55;
    margin:0;
  }

  /* --- classeur / tree --- */
  .tree{list-style:none;margin:0;padding:0;}
  .tree > li{margin-bottom:14px;}

  .folder{
    position:relative;
  }
  .folder-tab{
    display:flex;
    align-items:center;
    gap:12px;
    width:100%;
    text-align:left;
    background:var(--folder-tan);
    color:var(--board-dark);
    border:none;
    border-radius:4px 10px 10px 4px;
    padding:14px 18px;
    font-family:'Newsreader', serif;
    font-weight:600;
    font-size:18px;
    cursor:pointer;
    position:relative;
    transition:transform .15s ease, background .15s ease;
  }
  .folder-tab::before{
    content:"";
    position:absolute;
    left:0; top:-8px;
    width:46px; height:8px;
    background:var(--folder-tan);
    border-radius:6px 6px 0 0;
  }
  .folder-tab:hover{ background:var(--folder-tan-dark); transform:translateX(2px); }
  .folder-tab .chev{
    margin-left:auto;
    font-family:'IBM Plex Mono', monospace;
    font-size:13px;
    transition:transform .2s ease;
    opacity:.6;
  }
  .folder-tab[aria-expanded="true"] .chev{ transform:rotate(90deg); }

  .folder-body{
    overflow:hidden;
    max-height:0;
    transition:max-height .25s ease;
    padding-left:18px;
    border-left:2px dashed var(--line);
    margin-left:14px;
  }
  .folder-body.open{ max-height:2000px; }
  .folder-body-inner{ padding:14px 0 4px 18px; }

  /* nested folders slightly different tint */
  .folder-body .folder-tab{ background:var(--pastel-blue); }
  .folder-body .folder-body .folder-tab{ background:var(--pastel-pink); }

  .files{list-style:none;margin:6px 0 4px;padding:0;}
  .files li{margin-bottom:6px;}
  .files a{
    display:flex;
    align-items:center;
    gap:10px;
    color:var(--chalk);
    text-decoration:none;
    font-family:'IBM Plex Mono', monospace;
    font-size:14px;
    padding:8px 10px;
    border-radius:6px;
    border:1px solid var(--line);
    transition:background .15s ease, border-color .15s ease;
  }
  .files a:hover{ background:rgba(255,255,255,0.05); border-color:var(--pastel-yellow); }
  .files a::before{ content:"📄"; font-size:13px; }

  .empty-hint{
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    color:var(--chalk-dim);
    opacity:.6;
    padding:6px 0 2px;
  }

  footer{
    margin-top:60px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    color:var(--chalk-dim);
    opacity:.55;
    text-align:center;
  }

  @media (prefers-reduced-motion: reduce){
    .folder-tab, .folder-body, .chev{ transition:none; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <p class="eyebrow">Lien unique — mis à jour toute l'année</p>
    <h1>Espace de révisions</h1>
    <p>Cliquez sur un dossier pour l'ouvrir. De nouveaux dossiers et documents seront ajoutés au fil de l'année sur ce même lien.</p>
  </header>

  <ul class="tree" id="tree"></ul>

  <footer>Mis à jour automatiquement depuis data.js</footer>
</div>

<script src="data.js"></script>
<script>
  const treeRoot = document.getElementById('tree');

  function renderFolder(node, depth){
    const li = document.createElement('li');
    const folderDiv = document.createElement('div');
    folderDiv.className = 'folder';

    const btn = document.createElement('button');
    btn.className = 'folder-tab';
    btn.setAttribute('aria-expanded', 'false');
    btn.innerHTML = `<span>📁 ${node.nom}</span><span class="chev">›</span>`;

    const body = document.createElement('div');
    body.className = 'folder-body';
    const inner = document.createElement('div');
    inner.className = 'folder-body-inner';
    body.appendChild(inner);

    const hasChildren = (node.dossiers && node.dossiers.length) || (node.fichiers && node.fichiers.length);

    if(node.dossiers && node.dossiers.length){
      const subUl = document.createElement('ul');
      subUl.className = 'tree';
      node.dossiers.forEach(sub => subUl.appendChild(renderFolder(sub, depth+1)));
      inner.appendChild(subUl);
    }

    if(node.fichiers && node.fichiers.length){
      const filesUl = document.createElement('ul');
      filesUl.className = 'files';
      node.fichiers.forEach(f => {
        const fLi = document.createElement('li');
        const a = document.createElement('a');
        a.href = f.url;
        a.textContent = f.nom;
        a.target = '_blank';
        a.rel = 'noopener';
        fLi.appendChild(a);
        filesUl.appendChild(fLi);
      });
      inner.appendChild(filesUl);
    }

    if(!hasChildren){
      const hint = document.createElement('div');
      hint.className = 'empty-hint';
      hint.textContent = 'Aucun document pour le moment.';
      inner.appendChild(hint);
    }

    btn.addEventListener('click', () => {
      const isOpen = body.classList.toggle('open');
      btn.setAttribute('aria-expanded', String(isOpen));
    });

    folderDiv.appendChild(btn);
    folderDiv.appendChild(body);
    li.appendChild(folderDiv);
    return li;
  }

  STRUCTURE.forEach(node => treeRoot.appendChild(renderFolder(node, 0)));

  // Ouvre automatiquement le premier dossier de premier niveau
  const firstTab = treeRoot.querySelector('.folder-tab');
  if(firstTab) firstTab.click();
</script>
</body>
</html>
